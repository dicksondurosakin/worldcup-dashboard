<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 Team Fixture Visual</title>
<style>
:root{
  --blue:#2176FF;--purple:#6D39E9;--green:#03D44A;--navy:#0F172A;--gray:#6D737A;--light:#E7E9EB;--bg:#F8FAFC;--white:#fff;
}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--navy)}
header{padding:28px 22px;background:linear-gradient(135deg,var(--navy),#172554 55%,var(--purple));color:#fff}
header h1{margin:0 0 8px;font-size:clamp(24px,4vw,44px);letter-spacing:-.04em} header p{margin:0;opacity:.86;max-width:840px;line-height:1.5}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;padding:18px 22px;background:#fff;border-bottom:1px solid var(--light);position:sticky;top:0;z-index:5}
.search{flex:1;min-width:220px} input,select{width:100%;padding:12px 14px;border:1px solid var(--light);border-radius:12px;font-size:15px;background:#fff;color:var(--navy)}
main{display:grid;grid-template-columns:1fr 390px;gap:22px;padding:22px;max-width:1500px;margin:auto}.groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:18px}.group{background:#fff;border:1px solid var(--light);border-radius:20px;padding:16px;box-shadow:0 10px 28px rgba(15,23,42,.05)}
.group h2{font-size:17px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}.badge{font-size:12px;color:var(--gray);background:var(--bg);padding:6px 9px;border-radius:999px}.team{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;padding:11px;border-radius:14px;cursor:pointer;border:1px solid transparent;transition:.15s;background:#fff}.team:hover{border-color:#cfe0ff;background:#f7fbff}.team.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(33,118,255,.11)}
.flag{font-size:24px}.name{font-weight:700}.meta{font-size:12px;color:var(--gray);margin-top:2px}.pts{font-weight:800;color:var(--blue)}
aside{position:sticky;top:88px;align-self:start;background:#fff;border:1px solid var(--light);border-radius:24px;box-shadow:0 14px 40px rgba(15,23,42,.08);overflow:hidden}.panelTop{padding:20px;background:linear-gradient(135deg,#fff,#eef5ff)}.panelTop h2{margin:0 0 4px;font-size:25px;letter-spacing:-.03em}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:15px}.stat{background:#fff;border:1px solid var(--light);border-radius:14px;padding:10px;text-align:center}.stat strong{display:block;font-size:18px}.stat span{font-size:11px;color:var(--gray)}
.tabs{display:flex;padding:10px;background:var(--bg);gap:8px}.tab{flex:1;border:0;background:#fff;padding:10px;border-radius:12px;cursor:pointer;font-weight:700;color:var(--gray)}.tab.active{background:var(--navy);color:#fff}.fixtures{padding:16px;max-height:58vh;overflow:auto}.match{border:1px solid var(--light);border-radius:16px;padding:13px;margin-bottom:10px}.match.complete{border-left:5px solid var(--green)}.match.scheduled{border-left:5px solid var(--blue)}.match .date{font-size:12px;color:var(--gray);margin-bottom:7px}.scoreline{display:flex;justify-content:space-between;gap:10px;font-weight:750}.score{white-space:nowrap}.status{margin-top:8px;font-size:12px;display:inline-block;border-radius:999px;padding:5px 8px;background:var(--bg);color:var(--gray)}
.empty{color:var(--gray);line-height:1.5;padding:12px}.note{font-size:12px;color:var(--gray);padding:0 22px 18px;max-width:1500px;margin:auto}
@media(max-width:950px){main{grid-template-columns:1fr} aside{position:static}.fixtures{max-height:none}.toolbar{position:static}}
</style>
</head>
<body>
<header><h1>World Cup 2026 Team Fixtures</h1><p>Browse the normal groups, click any team, and instantly see the games they have played plus their upcoming fixtures. Based on the available schedule snapshot as of 21 June 2026.</p></header>
<div class="toolbar"><div class="search"><input id="search" placeholder="Search country, e.g. Japan, Netherlands, France…" /></div><select id="groupFilter"><option value="all">All groups</option></select></div>
<main><section class="groups" id="groups"></section><aside id="panel"></aside></main><div class="note">Tip: On mobile, tap a team card, then scroll down to see its fixture panel.</div>
<script>
const groups={
A:['Mexico','South Africa','South Korea','Czechia'],B:['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],C:['Brazil','Morocco','Haiti','Scotland'],D:['United States','Paraguay','Australia','Turkey'],E:['Germany','Curacao','Ivory Coast','Ecuador'],F:['Netherlands','Japan','Sweden','Tunisia'],G:['Belgium','Egypt','Iran','New Zealand'],H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],I:['France','Senegal','Iraq','Norway'],J:['Argentina','Algeria','Austria','Jordan'],K:['Portugal','DR Congo','Uzbekistan','Colombia'],L:['England','Croatia','Ghana','Panama']
};
const flag={Mexico:'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷',Czechia:'🇨🇿',Canada:'🇨🇦','Bosnia and Herzegovina':'🇧🇦',Qatar:'🇶🇦',Switzerland:'🇨🇭',Brazil:'🇧🇷',Morocco:'🇲🇦',Haiti:'🇭🇹',Scotland:'🏴','United States':'🇺🇸',Paraguay:'🇵🇾',Australia:'🇦🇺',Turkey:'🇹🇷',Germany:'🇩🇪',Curacao:'🇨🇼','Ivory Coast':'🇨🇮',Ecuador:'🇪🇨',Netherlands:'🇳🇱',Japan:'🇯🇵',Sweden:'🇸🇪',Tunisia:'🇹🇳',Belgium:'🇧🇪',Egypt:'🇪🇬',Iran:'🇮🇷','New Zealand':'🇳🇿',Spain:'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦',Uruguay:'🇺🇾',France:'🇫🇷',Senegal:'🇸🇳',Iraq:'🇮🇶',Norway:'🇳🇴',Argentina:'🇦🇷',Algeria:'🇩🇿',Austria:'🇦🇹',Jordan:'🇯🇴',Portugal:'🇵🇹','DR Congo':'🇨🇩',Uzbekistan:'🇺🇿',Colombia:'🇨🇴',England:'🏴',Croatia:'🇭🇷',Ghana:'🇬🇭',Panama:'🇵🇦'};
const matches=[
['2026-06-11','Group A','Mexico','South Africa',2,0,'Complete'],['2026-06-11','Group A','South Korea','Czechia',2,1,'Complete'],['2026-06-12','Group B','Canada','Bosnia and Herzegovina',1,1,'Complete'],['2026-06-12','Group D','United States','Paraguay',4,1,'Complete'],['2026-06-13','Group B','Qatar','Switzerland',1,1,'Complete'],['2026-06-13','Group C','Brazil','Morocco',1,1,'Complete'],['2026-06-13','Group C','Haiti','Scotland',0,1,'Complete'],['2026-06-14','Group D','Australia','Turkey',2,0,'Complete'],['2026-06-14','Group E','Germany','Curacao',7,1,'Complete'],['2026-06-14','Group F','Netherlands','Japan',2,2,'Complete'],['2026-06-14','Group E','Ivory Coast','Ecuador',1,0,'Complete'],['2026-06-14','Group F','Sweden','Tunisia',5,1,'Complete'],['2026-06-15','Group H','Spain','Cape Verde',0,0,'Complete'],['2026-06-15','Group G','Belgium','Egypt',1,1,'Complete'],['2026-06-15','Group H','Saudi Arabia','Uruguay',1,1,'Complete'],['2026-06-15','Group G','Iran','New Zealand',2,2,'Complete'],['2026-06-16','Group I','France','Senegal',3,1,'Complete'],['2026-06-16','Group I','Iraq','Norway',1,4,'Complete'],['2026-06-16','Group J','Argentina','Algeria',3,0,'Complete'],['2026-06-17','Group J','Austria','Jordan',3,1,'Complete'],['2026-06-17','Group K','Portugal','DR Congo',1,1,'Complete'],['2026-06-17','Group L','England','Croatia',4,2,'Complete'],['2026-06-17','Group L','Ghana','Panama',1,0,'Complete'],['2026-06-17','Group K','Uzbekistan','Colombia',1,3,'Complete'],['2026-06-18','Group A','Czechia','South Africa',1,1,'Complete'],['2026-06-18','Group B','Switzerland','Bosnia and Herzegovina',4,1,'Complete'],['2026-06-18','Group B','Canada','Qatar',6,0,'Complete'],['2026-06-18','Group A','Mexico','South Korea',1,0,'Complete'],['2026-06-19','Group D','United States','Australia',2,0,'Complete'],['2026-06-19','Group C','Scotland','Morocco',0,1,'Complete'],['2026-06-19','Group C','Brazil','Haiti',3,0,'Complete'],['2026-06-19','Group D','Turkey','Paraguay',0,1,'Complete'],['2026-06-20','Group F','Netherlands','Sweden',5,1,'Complete'],['2026-06-20','Group E','Germany','Ivory Coast',2,1,'Complete'],['2026-06-20','Group E','Ecuador','Curacao',0,0,'Complete'],['2026-06-21','Group F','Tunisia','Japan',0,4,'Complete'],
['2026-06-21','Group H','Spain','Saudi Arabia',null,null,'Scheduled'],['2026-06-21','Group G','Belgium','Iran',null,null,'Scheduled'],['2026-06-21','Group H','Uruguay','Cape Verde',null,null,'Scheduled'],['2026-06-21','Group G','New Zealand','Egypt',null,null,'Scheduled'],['2026-06-22','Group J','Argentina','Austria',null,null,'Scheduled'],['2026-06-22','Group I','France','Iraq',null,null,'Scheduled'],['2026-06-22','Group I','Norway','Senegal',null,null,'Scheduled'],['2026-06-22','Group J','Jordan','Algeria',null,null,'Scheduled'],['2026-06-23','Group K','Portugal','Uzbekistan',null,null,'Scheduled'],['2026-06-23','Group L','England','Ghana',null,null,'Scheduled'],['2026-06-23','Group L','Panama','Croatia',null,null,'Scheduled'],['2026-06-23','Group K','Colombia','DR Congo',null,null,'Scheduled'],['2026-06-24','Group B','Switzerland','Canada',null,null,'Scheduled'],['2026-06-24','Group B','Bosnia and Herzegovina','Qatar',null,null,'Scheduled'],['2026-06-24','Group C','Scotland','Brazil',null,null,'Scheduled'],['2026-06-24','Group C','Morocco','Haiti',null,null,'Scheduled'],['2026-06-24','Group A','Czechia','Mexico',null,null,'Scheduled'],['2026-06-24','Group A','South Africa','South Korea',null,null,'Scheduled'],['2026-06-25','Group E','Ecuador','Germany',null,null,'Scheduled'],['2026-06-25','Group E','Curacao','Ivory Coast',null,null,'Scheduled'],['2026-06-25','Group F','Tunisia','Netherlands',null,null,'Scheduled'],['2026-06-25','Group F','Japan','Sweden',null,null,'Scheduled'],['2026-06-25','Group D','Turkey','United States',null,null,'Scheduled'],['2026-06-25','Group D','Paraguay','Australia',null,null,'Scheduled'],['2026-06-26','Group I','Norway','France',null,null,'Scheduled'],['2026-06-26','Group I','Senegal','Iraq',null,null,'Scheduled'],['2026-06-26','Group H','Uruguay','Spain',null,null,'Scheduled'],['2026-06-26','Group H','Cape Verde','Saudi Arabia',null,null,'Scheduled'],['2026-06-26','Group G','New Zealand','Belgium',null,null,'Scheduled'],['2026-06-26','Group G','Egypt','Iran',null,null,'Scheduled'],['2026-06-27','Group L','Panama','England',null,null,'Scheduled'],['2026-06-27','Group L','Croatia','Ghana',null,null,'Scheduled'],['2026-06-27','Group K','Colombia','Portugal',null,null,'Scheduled'],['2026-06-27','Group K','DR Congo','Uzbekistan',null,null,'Scheduled'],['2026-06-27','Group J','Jordan','Argentina',null,null,'Scheduled'],['2026-06-27','Group J','Algeria','Austria',null,null,'Scheduled']
].map((m,i)=>({id:i,date:m[0],group:m[1],home:m[2],away:m[3],hs:m[4],as:m[5],status:m[6]}));
const stats={}; Object.values(groups).flat().forEach(t=>stats[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
matches.filter(m=>m.status==='Complete').forEach(m=>{let h=stats[m.home],a=stats[m.away];h.p++;a.p++;h.gf+=m.hs;h.ga+=m.as;a.gf+=m.as;a.ga+=m.hs;if(m.hs>m.as){h.w++;a.l++;h.pts+=3}else if(m.hs<m.as){a.w++;h.l++;a.pts+=3}else{h.d++;a.d++;h.pts++;a.pts++}h.gd=h.gf-h.ga;a.gd=a.gf-a.ga});
const groupOf=t=>Object.keys(groups).find(g=>groups[g].includes(t));
function rankInGroup(t){return [...groups[groupOf(t)]].sort((a,b)=>stats[b].pts-stats[a].pts||stats[b].gd-stats[a].gd||stats[b].gf-stats[a].gf).indexOf(t)+1}
let selected='Japan', mode='all';
const gf=document.getElementById('groupFilter'); Object.keys(groups).forEach(g=>gf.innerHTML+=`<option value="${g}">Group ${g}</option>`);
function renderGroups(){const q=document.getElementById('search').value.toLowerCase(); const filter=gf.value; const root=document.getElementById('groups'); root.innerHTML=''; Object.entries(groups).forEach(([g,teams])=>{if(filter!=='all'&&filter!==g)return; const shown=teams.filter(t=>t.toLowerCase().includes(q)); if(!shown.length)return; const div=document.createElement('div');div.className='group'; div.innerHTML=`<h2>Group ${g}<span class="badge">${teams.length} teams</span></h2>`+shown.map(t=>`<div class="team ${t===selected?'active':''}" onclick="selectTeam('${t.replace(/'/g,"\\'")}')"><div class="flag">${flag[t]||'🏳️'}</div><div><div class="name">${t}</div><div class="meta">${ordinal(rankInGroup(t))} • ${stats[t].gd>=0?'+':''}${stats[t].gd} GD</div></div><div class="pts">${stats[t].pts}</div></div>`).join(''); root.appendChild(div)})}
function ordinal(n){return n+(n==1?'st':n==2?'nd':n==3?'rd':'th')}
function selectTeam(t){selected=t;render()}
function renderPanel(){const s=stats[selected], teamMatches=matches.filter(m=>m.home===selected||m.away===selected); const filtered=teamMatches.filter(m=>mode==='all'||(mode==='played'?m.status==='Complete':m.status==='Scheduled')); document.getElementById('panel').innerHTML=`<div class="panelTop"><h2>${flag[selected]||''} ${selected}</h2><div class="meta">Group ${groupOf(selected)} • ${ordinal(rankInGroup(selected))} place</div><div class="stats"><div class="stat"><strong>${s.pts}</strong><span>PTS</span></div><div class="stat"><strong>${s.p}</strong><span>Played</span></div><div class="stat"><strong>${s.gf}</strong><span>GF</span></div><div class="stat"><strong>${s.gd>=0?'+':''}${s.gd}</strong><span>GD</span></div></div></div><div class="tabs"><button class="tab ${mode==='all'?'active':''}" onclick="mode='all';renderPanel()">All</button><button class="tab ${mode==='played'?'active':''}" onclick="mode='played';renderPanel()">Played</button><button class="tab ${mode==='coming'?'active':''}" onclick="mode='coming';renderPanel()">Coming</button></div><div class="fixtures">${filtered.length?filtered.map(matchCard).join(''):'<div class="empty">No fixtures in this section yet.</div>'}</div>`}
function matchCard(m){const complete=m.status==='Complete'; return `<div class="match ${complete?'complete':'scheduled'}"><div class="date">${new Date(m.date+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short',year:'numeric'})} • ${m.group}</div><div class="scoreline"><span>${flag[m.home]||''} ${m.home}</span><span class="score">${complete?m.hs:'–'}</span></div><div class="scoreline"><span>${flag[m.away]||''} ${m.away}</span><span class="score">${complete?m.as:'–'}</span></div><span class="status">${complete?'Played':'Upcoming'}</span></div>`}
function render(){renderGroups();renderPanel()} document.getElementById('search').addEventListener('input',renderGroups); gf.addEventListener('change',renderGroups); render();
</script>
</body>
</html>
